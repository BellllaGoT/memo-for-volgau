<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои заметки</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .note { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .note h3 { margin-top: 0; }
        form { margin-bottom: 20px; }
        input, textarea { width: 100%; margin-bottom: 5px; padding: 8px; box-sizing: border-box; }
        button { padding: 8px 16px; }
    </style>
</head>
<body>
    <h1>Мои заметки</h1>
    <form action="/add" method="post">
        <input type="text" name="title" placeholder="Название заметки" required>
        <textarea name="content" placeholder="Текст заметки..." rows="3"></textarea>
        <button type="submit">Добавить заметку</button>
    </form>

    <h2>Список заметок</h2>
    {% if notes %}
        {% for note in notes %}
        <div class="note">
            <h3><a href="/note/{{ note.id }}">{{ note.title }}</a></h3>
            <p>{{ note.content[:100] }}{% if note.content|length > 100 %}...{% endif %}</p>
            <small>{{ note.created }}</small>
            <form action="/delete/{{ note.id }}" method="post" style="display:inline; margin-left:10px;">
                <button type="submit" onclick="return confirm('Удалить заметку?')">Удалить</button>
            </form>
        </div>
        {% endfor %}
    {% else %}
        <p>Пока нет ни одной заметки.</p>
    {% endif %}
</body>
</html>
